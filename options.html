<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Review It - Options</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 480px;
      }
      h1 { font-size: 20px; margin-bottom: 16px; }
      label { display: block; font-weight: 500; margin-bottom: 6px; }
      input[type="password"] {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
      }
      .hint { font-size: 12px; color: #6b7280; margin-top: 6px; }
      button {
        margin-top: 16px;
        padding: 8px 16px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
      }
      button:hover { background: #1d4ed8; }
      .saved { color: #059669; font-size: 13px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Review It – Options</h1>
    <label for="api-key">OpenAI API key</label>
    <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" />
    <p class="hint">Stored locally in your browser. Used only to generate reviews.</p>
    <button id="save">Save</button>
    <p id="saved-msg" class="saved" style="display: none;">Saved.</p>
    <script type="module" src="dist/options.js"></script>
  </body>
</html>
